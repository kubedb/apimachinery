name: update-crds

on:
  push:
    branches:
      - master
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    steps:
      - name: Set up Go 1.25
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5.6.0
        with:
          go-version: '1.25'
        id: go

      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Install crd-importer
        run: |
          curl -L -o crd-importer https://github.com/kmodules/crd-importer/releases/download/v0.0.1/crd-importer-linux-amd64
          chmod +x ./crd-importer
          sudo mv ./crd-importer /usr/local/bin/crd-importer

      - name: Generate LGTM App token
        id: lgtm-app-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          client-id: ${{ secrets.LGTM_APP_CLIENT_ID }}
          private-key: ${{ secrets.LGTM_APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}
          repositories: installer

      - name: Clone installer repository
        env:
          GITHUB_USER: ${{ steps.lgtm-app-token.outputs.app-slug }}
          GITHUB_TOKEN: ${{ steps.lgtm-app-token.outputs.token }}
          INSTALLER_REPOSITORY: ${{ secrets.INSTALLER_REPOSITORY }}
        run: |
          url="https://x-access-token:${GITHUB_TOKEN}@${INSTALLER_REPOSITORY}.git"
          cd $RUNNER_WORKSPACE
          git clone $url
          cd $(basename $INSTALLER_REPOSITORY)
          git config user.name "${GITHUB_USER}[bot]"
          git config user.email "${GITHUB_USER}[bot]@users.noreply.github.com"

      - name: Update crds
        env:
          GITHUB_USER: ${{ steps.lgtm-app-token.outputs.app-slug }}
          GITHUB_TOKEN: ${{ steps.lgtm-app-token.outputs.token }}
          INSTALLER_REPOSITORY: ${{ secrets.INSTALLER_REPOSITORY }}
        run: |
          export INSTALLER_ROOT=$RUNNER_WORKSPACE/$(basename $INSTALLER_REPOSITORY)
          cd $INSTALLER_ROOT
          ./hack/scripts/import-crds.sh ..
          ./hack/scripts/open-pr.sh
